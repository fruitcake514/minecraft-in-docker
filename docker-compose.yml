version: "3.9"

services:
  minecraft-web:
    build:
      context: https://github.com/fruitcake514/minecraft-in-docker.git
    container_name: minecraft-in-docker
    restart: unless-stopped

    ports:
      - "47984:47984/tcp"
      - "47989:47989/tcp"
      - "47990:47990/tcp"
      - "48010:48010/tcp"
      - "47998:47998/udp"
      - "47999:47999/udp"
      - "48000:48000/udp"
      - "48002:48002/udp"

    environment:
      - DISPLAY=:0
      - XDG_RUNTIME_DIR=/tmp/runtime-root
      - PULSE_SERVER=unix:/tmp/pulse/native

      # Name of Prism instance to auto-launch when present
      - MC_INSTANCE=Vanilla

      # Intel iGPU:
      - MESA_LOADER_DRIVER_OVERRIDE=iris

      # AMD iGPU? use:
      # - MESA_LOADER_DRIVER_OVERRIDE=radeonsi

      - LIBGL_ALWAYS_SOFTWARE=0
      - __GLX_VENDOR_LIBRARY_NAME=mesa
      - vblank_mode=0

    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card0:/dev/dri/card0
      - /dev/kfd:/dev/kfd

    # IMPORTANT: replace these with your host's actual group IDs
    # getent group video
    # getent group render
    group_add:
      - "44"
      - "109"

    shm_size: "4gb"

    volumes:
      - ./data/prism:/home/gamer/.local/share/PrismLauncher
      - ./data/minecraft:/home/gamer/.minecraft
      - ./data/sunshine:/home/gamer/.config/sunshine

    security_opt:
      - seccomp=unconfined

    cap_add:
      - SYS_ADMIN

    tmpfs:
      - /tmp:size=2g
      - /run:size=256m
